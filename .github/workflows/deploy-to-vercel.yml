name: Build and Deploy to Vercel

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd site || exit 0
          npm ci

      - name: Build site
        run: |
          cd site || exit 0
          npm run build

      - name: Deploy to Vercel via CLI
        run: |
          cd site || exit 0
          # install vercel cli and deploy to specific project
          npm install --no-audit --no-fund vercel@latest
          npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --confirm --project prj_Ib9wVMWl6ucFNzwyHzktDIYPAV7o
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
